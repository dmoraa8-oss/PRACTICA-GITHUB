<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<title>Cronómetro</title>

<style>

* { 
  box-sizing: border-box; 
  font-family: 'Segoe UI', Tahoma, sans-serif; 
  margin: 0;
}

body {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  padding: 20px;
}

.app {
  text-align: center;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 50px 40px;
  border-radius: 25px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  width: 420px;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

h1 { 
  margin: 0 0 25px; 
  color: #fff; 
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 1px;
}

.display {
  font-size: 64px;
  font-weight: 700;
  margin: 30px 0 40px;
  font-family: 'Courier New', monospace;
  color: #fff;
  letter-spacing: 3px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.3);
  padding: 20px;
  background: rgba(0, 0, 0, 0.2);
  border-radius: 15px;
}

.buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

button {
  padding: 14px 28px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  color: white;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

button:active {
  transform: translateY(0);
}

.start { background: linear-gradient(135deg, #00b894, #00cec9); }
.start:hover { background: linear-gradient(135deg, #00997a, #00a8a3); }

  .reset:hover { background: #a82525; }
  .lap { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
  .lap:hover { background: linear-gradient(135deg, #5a4bd1, #8b85e0); }

  .laps {
    margin-top: 25px;
    max-height: 200px;
    overflow-y: auto;
    text-align: left;
  }

  .laps li {
    list-style: none;
    padding: 10px 15px;
    margin: 5px 0;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: space-between;
  }
</style>

</head>

<body>

  <div class="app">

    <h1>🚀 Cronómetro Pro</h1>

    <div class="display" id="display">00:00:00</div>

    <div class="buttons">

      <button class="start" id="btnStart" onclick="start()">Iniciar</button>

      <button class="pause" onclick="pause()">Pausar</button>

      <button class="reset" onclick="reset()">Reiniciar</button>
      <button class="lap" onclick="lap()">Vuelta</button>

    </div>
  <ul class="laps" id="laps"></ul>
  </div>


<script>

let lapCount = 0;

function lap() {
  if (!running) return;
  lapCount++;
  const ul = document.getElementById('laps');
  const li = document.createElement('li');
  li.innerHTML = `<span>Vuelta ${lapCount}</span><span>${document.getElementById('display').textContent}</span>`;
  ul.prepend(li);
}


updateDisplay();

</script>

</body>

</html>
