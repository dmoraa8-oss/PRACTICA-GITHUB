<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<title>Cronómetro</title>

<style>

* { 
  box-sizing: border-box; 
  font-family: 'Segoe UI', Tahoma, sans-serif; 
  margin: 0;
}

body {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  padding: 20px;
}

.app {
  text-align: center;
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 50px 40px;
  border-radius: 25px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  width: 420px;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

h1 { 
  margin: 0 0 25px; 
  color: #fff; 
  font-size: 28px;
  font-weight: 300;
  letter-spacing: 1px;
}

.display {
  font-size: 64px;
  font-weight: 700;
  margin: 30px 0 40px;
  font-family: 'Courier New', monospace;
  color: #fff;
  letter-spacing: 3px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.3);
  padding: 20px;
  background: rgba(0, 0, 0, 0.2);
  border-radius: 15px;
}

.buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

button {
  padding: 14px 28px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  color: white;
  transition: all 0.3s ease;
  text-transform: uppercase;
  letter-spacing: 1px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

button:active {
  transform: translateY(0);
}

.start { background: linear-gradient(135deg, #00b894, #00cec9); }
.start:hover { background: linear-gradient(135deg, #00997a, #00a8a3); }

.pause { background: linear-gradient(135deg, #fdcb6e, #f39c12); color: #333; }
.pause:hover { background: linear-gradient(135deg, #e0a838, #d68910); }

.reset { background: linear-gradient(135deg, #e74c3c, #c0392b); }
.reset:hover { background: linear-gradient(135deg, #c0392b, #a93226); }
</style>

</head>

<body>

  <div class="app">

    <h1>⏱️ Mi Reloj Web</h1>

    <div class="display" id="display">00:00:00</div>

    <div class="buttons">

      <button class="start" id="btnStart" onclick="start()">Iniciar</button>

      <button class="pause" onclick="pause()">Pausar</button>

      <button class="reset" onclick="reset()">Reiniciar</button>

    </div>

  </div>


<script>

let hours = 0, minutes = 0, seconds = 0;

let interval = null;

let running = false;


function updateDisplay() {

  const h = String(hours).padStart(2, '0');

  const m = String(minutes).padStart(2, '0');

  const s = String(seconds).padStart(2, '0');

  document.getElementById('display').textContent = `${h}:${m}:${s}`;

}


function tick() {

  seconds++;

  if (seconds === 60) { seconds = 0; minutes++; }

  if (minutes === 60) { minutes = 0; hours++; }

  updateDisplay();

}


function start() {

  if (running) return;

  running = true;

  interval = setInterval(tick, 1000);

}


function pause() {

  running = false;

  clearInterval(interval);

}


function reset() {

  pause();

  hours = minutes = seconds = 0;

  updateDisplay();

}


updateDisplay();

</script>

</body>

</html>
