<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<title>Cronómetro</title>

<style>

  * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

  body {

    background: #1a1a2e;

    min-height: 100vh;

    display: flex;

    justify-content: center;

    align-items: center;

    margin: 0;

    color: white;

  }

  .app {

    text-align: center;

    background: #16213e;

    padding: 40px;

    border-radius: 20px;

    box-shadow: 0 10px 30px rgba(0,0,0,0.4);

    width: 400px;

  }

  h1 { margin: 0 0 20px; color: #00d4ff; }

  .display {

    font-size: 60px;

    font-weight: bold;

    margin: 30px 0;

    font-family: 'Courier New', monospace;

    color: #00ff88;

    letter-spacing: 2px;

  }

  .buttons {

    display: flex;

    gap: 10px;

    justify-content: center;

  }

  button {

    padding: 12px 25px;

    border: none;

    border-radius: 8px;

    cursor: pointer;

    font-size: 16px;

    font-weight: bold;

    color: white;

  }

  .start { background: #00b894; }

  .start:hover { background: #00997a; }

  .pause { background: #fdcb6e; color: #333; }

  .pause:hover { background: #e0a838; }

  .reset { background: #d63031; }

  .reset:hover { background: #a82525; }
  .lap { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
  .lap:hover { background: linear-gradient(135deg, #5a4bd1, #8b85e0); }

  .laps {
    margin-top: 25px;
    max-height: 200px;
    overflow-y: auto;
    text-align: left;
  }

  .laps li {
    list-style: none;
    padding: 10px 15px;
    margin: 5px 0;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: space-between;
  }
</style>

</head>

<body>

  <div class="app">

    <h1>🚀 Cronómetro Pro</h1>

    <div class="display" id="display">00:00:00</div>

    <div class="buttons">

      <button class="start" id="btnStart" onclick="start()">Iniciar</button>

      <button class="pause" onclick="pause()">Pausar</button>

      <button class="reset" onclick="reset()">Reiniciar</button>
      <button class="lap" onclick="lap()">Vuelta</button>

    </div>
  <ul class="laps" id="laps"></ul>
  </div>


<script>

let lapCount = 0;

function lap() {
  if (!running) return;
  lapCount++;
  const ul = document.getElementById('laps');
  const li = document.createElement('li');
  li.innerHTML = `<span>Vuelta ${lapCount}</span><span>${document.getElementById('display').textContent}</span>`;
  ul.prepend(li);
}


updateDisplay();

</script>

</body>

</html>
